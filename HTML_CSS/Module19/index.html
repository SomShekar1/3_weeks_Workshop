<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Responsive Website</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

    <!-- Navigation -->

    <nav>

        <div class="logo">
            NovaTech
        </div>

        <ul>

            <li><a href="#">Home</a></li>

            <li><a href="#">About</a></li>

            <li><a href="#">Services</a></li>

            <li><a href="#">Contact</a></li>

        </ul>

    </nav>

    <!-- Hero Section -->

    <section class="hero">

        <div class="hero-text">

            <h1>
                Build Modern Websites
            </h1>

            <p>
                Responsive design for all devices.
            </p>

            <button>
                Get Started
            </button>

        </div>

        <div class="hero-image">

            <img src="https://picsum.photos/500/350"
            alt="Hero Image">

        </div>

    </section>

    <!-- Product Cards -->

    <section class="products">

        <div class="card">
            <h3>Product 1</h3>
        </div>

        <div class="card">
            <h3>Product 2</h3>
        </div>

        <div class="card">
            <h3>Product 3</h3>
        </div>

        <div class="card">
            <h3>Product 4</h3>
        </div>

    </section>

    <!-- Gallery -->

    <section class="gallery">

        <img src="https://picsum.photos/300?1">

        <img src="https://picsum.photos/300?2">

        <img src="https://picsum.photos/300?3">

        <img src="https://picsum.photos/300?4">

        <img src="https://picsum.photos/300?5">

        <img src="https://picsum.photos/300?6">

    </section>

    <!-- Footer -->

    <footer>

        <h3>NovaTech</h3>

        <p>
            © 2026 All Rights Reserved
        </p>

    </footer>

</body>
</html>
