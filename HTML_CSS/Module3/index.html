<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>

    <style>
        .gallery {
            display: inline-block;
            margin: 10px;
            text-align: center;
        }

        img {
            width: 300px;
            height: 150px;
        }
    </style>

</head>
<body>

    <h1>My Image Gallery</h1>

    <div class="gallery">
        <img src="nature.jpg" alt="Nature Image">
        <p>Nature</p>
    </div>

    <div class="gallery">
        <img src="mountain.jpg" alt="Mountain Image">
        <p>Mountains</p>
    </div>

    <div class="gallery">
        <img src="beach.jpg" alt="Beach Image">
        <p>Beach</p>
    </div>

    <div class="gallery">
        <img src="forest.jpg" alt="Forest Image">
        <p>Forest</p>
    </div>

    <div class="gallery">
        <img src="river.jpg" alt="River Image">
        <p>River</p>
    </div>

    <div class="gallery">
        <img src="image6.jpg" alt="Sunset Image">
        <p>Sunset</p>
    </div>

</body>
</html>
