<!DOCTYPE html>
<html>
<head>
    <title>Button Design</title>

    <style>

        body{
            background-color: #05112b;
            text-align: center;
        }

        .follow{
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 8px;
            font-size: 18px;
            margin: 20px;
        }

        .message{
            background-color: white;
            color: black;
            border: none;
            padding: 15px 45px;
            border-radius: 8px;
            font-size: 18px;
            margin: 20px;
        }

         button{
            padding: 15px 40px;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 18px;
            margin: 10px;
        }

        .btn1{
            background: linear-gradient(to right, cyan, violet);
        }

        .btn2{
            background: linear-gradient(to right, orange, pink);
        }

        .btn2:hover{
            background: linear-gradient(to left , red, blue);
        }
         .outline{
            background-color: white;
            color: blue;
            border: 2px solid blue;
        }
    </style>
</head>
<body>

    <button class="follow">Follow</button>
    <br>

    <button class="message" >Message</button>
    <br>
    
    <button class="btn1">SIGN IN</button>

    <button class="btn2">SIGN IN</button>

    <br>

    <button class="btn1">SIGN UP</button>

    <button class="btn2">SIGN UP</button>

</body>
</html>
