<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Login</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

<div class="login-box">

    <div class="tabs">
        <span class="active">SIGN IN</span>
        <span>SIGN UP</span>
    </div>

    <form>

        <input type="email"
               placeholder="Username">

        <input type="password"
               placeholder="Password">

        <div class="remember">
            <input type="checkbox">
            <label>Keep me logged in</label>
        </div>

        <button type="submit">
            SIGN IN
        </button>

        <a href="#">Forgot Password?</a>

    </form>

</div>

</body>
</html>
