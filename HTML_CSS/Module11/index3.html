<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>

    <link rel="stylesheet" href="style3.css">
</head>
<body>

    <div class="login-container">

        <div class="login-box">

            <h2>Login</h2>

            <form>

                <label>Email</label>

                <input
                    type="email"
                    placeholder="Enter email">

                <label>Password</label>

                <input
                    type="password"
                    placeholder="Enter password">

                <div class="remember">

                    <label>
                        <input type="checkbox">
                        Keep me logged in
                    </label>

                </div>

                <button type="submit">
                    SIGN IN
                </button>

                <div class="links">

                    <a href="#">
                        Forgot Username / Password?
                    </a>

                    <p>
                        Don't have an account?
                        <a href="#">Sign Up</a>
                    </p>

                </div>

            </form>

        </div>

    </div>

</body>
</html>
