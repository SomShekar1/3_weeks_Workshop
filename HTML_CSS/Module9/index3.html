<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Cards</title>

    <link rel="stylesheet" href="style3.css">
</head>
<body>

    <div class="container">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1602143407151-7111542de6e8?w=400" alt="Bottle">

            <h3>Product Name</h3>

            <p>Product Description</p>

            <div class="price">$75.00</div>

            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=400" alt="Watch">

            <h3>Product Name</h3>

            <p>Product Description</p>

            <div class="price">$75.00</div>

            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400" alt="Headphone">

            <h3>Product Name</h3>

            <p>Product Description</p>

            <div class="price">$75.00</div>

            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=400" alt="Sunglasses">

            <h3>Product Name</h3>

            <p>Product Description</p>

            <div class="price">$75.00</div>

            <button>Add to Cart</button>
        </div>

    </div>

</body>
</html>
