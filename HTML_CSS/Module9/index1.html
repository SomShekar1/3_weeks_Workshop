<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Products</title>
    <link rel="stylesheet" href="style1.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="outer-container">

    <div class="main-box">

        <h2>Our Products</h2>

        <div class="categories">
            <span>Best Sellers</span>
            <span>Summer Specials</span>
            <span>New Products</span>
        </div>

        <div class="product-grid">

            <div class="card">
                <img src="https://images.unsplash.com/photo-1566385101042-1a0aa0c1268c?w=400" alt="">
                <h4>Andhra Peas</h4>
                <p>₹ 75/kg 500 gm</p>

                <div class="bottom">
                    <i class="fa-solid fa-bag-shopping"></i>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1615485925873-6b31f4d72a1b?w=400" alt="">
                <h4>Peas</h4>
                <p>₹ 75/kg 500 gm</p>

                <div class="bottom">
                    <i class="fa-solid fa-bag-shopping"></i>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1598170845058-32b9d6a5da37?w=400" alt="">
                <h4>Beetroot</h4>
                <p>₹ 50/kg 500 gm</p>

                <div class="bottom">
                    <i class="fa-solid fa-bag-shopping"></i>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1598170845058-32b9d6a5da37?w=400" alt="">
                <h4>Beetroot</h4>
                <p>₹ 50/kg 500 gm</p>

                <div class="bottom qty">
                    <span>-</span>
                    <span>3</span>
                    <span>+</span>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1623065422902-30a2d299bbe4?w=400" alt="">
                <h4>Mango Juice</h4>
                <p>₹ 50/kg 500 gm</p>

                <div class="bottom qty">
                    <span>-</span>
                    <span>1</span>
                    <span>+</span>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1566385101042-1a0aa0c1268c?w=400" alt="">
                <h4>Andhra Peas</h4>
                <p>₹ 50/kg 500 gm</p>

                <div class="bottom qty">
                    <span>-</span>
                    <span>6</span>
                    <span>+</span>
                </div>
            </div>

        </div>

        <button class="view-btn">
            View More
        </button>

    </div>

</div>

</body>
</html>
