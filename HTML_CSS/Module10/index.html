<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">

        <h2>Student Registration Form</h2>

        <form>

            <!-- Name -->

            <label for="name">Full Name</label>
            <input type="text"
                   id="name"
                   placeholder="Enter your full name">

            <!-- Email -->

            <label for="email">Email</label>
            <input type="email"
                   id="email"
                   placeholder="Enter your email">

            <!-- Phone -->

            <label for="phone">Phone Number</label>
            <input type="tel"
                   id="phone"
                   placeholder="Enter phone number">

            <!-- Password -->

            <label for="password">Password</label>
            <input type="password"
                   id="password"
                   placeholder="Enter password">

            <!-- Gender -->

            <label>Gender</label>

            <div class="radio-group">

                <label>
                    <input type="radio"
                           name="gender">
                    Male
                </label>

                <label>
                    <input type="radio"
                           name="gender">
                    Female
                </label>

                <label>
                    <input type="radio"
                           name="gender">
                    Other
                </label>

            </div>

            <!-- Department -->

            <label for="department">Department</label>

            <select id="department">

                <option>Select Department</option>

                <option>CSE</option>

                <option>ISE</option>

                <option>ECE</option>

                <option>EEE</option>

                <option>MECH</option>

            </select>

            <!-- Skills -->

            <label>Skills</label>

            <div class="checkbox-group">

                <label>
                    <input type="checkbox">
                    HTML
                </label>

                <label>
                    <input type="checkbox">
                    CSS
                </label>

                <label>
                    <input type="checkbox">
                    JavaScript
                </label>

                <label>
                    <input type="checkbox">
                    Python
                </label>

            </div>

            <!-- Address -->

            <label for="address">Address</label>

            <textarea id="address"
                      rows="4"
                      placeholder="Enter your address"></textarea>

            <!-- Submit -->

            <button type="submit">
                Register
            </button>

        </form>

    </div>

</body>
</html>
