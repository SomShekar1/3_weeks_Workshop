<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Landing Page</title>

    <link rel="stylesheet" href="style4.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<section class="hero">

    <!-- Navbar -->

    <nav>

        <div class="logo">
            DCR
        </div>

        <ul>

            <li><a href="#">Home</a></li>

            <li><a href="#">Features</a></li>

            <li><a href="#">Pricing</a></li>

            <li><a href="#">Contact</a></li>

        </ul>

        <button class="nav-btn">
            Get Started
        </button>

    </nav>

    <!-- Hero Content -->

    <div class="hero-content">

        <div class="left">

            <h1>
                We Help You
                Grow Your
                Business Faster
            </h1>

            <p>
                Powerful digital solutions to boost
                productivity, improve collaboration,
                and increase business growth.
            </p>

            <div class="buttons">

                <button class="btn-primary">
                    Get Started
                </button>

                <button class="btn-secondary">
                    Learn More
                </button>

            </div>

        </div>

        <!-- Right Side -->

        <div class="right">

            <img
            src="https://images.unsplash.com/photo-1552664730-d307ca884978?w=700"
            alt="Dashboard">

            <!-- Floating Cards -->

            <div class="floating-card card1">

                <h3>+35%</h3>

                <p>Sales Growth</p>

            </div>

            <div class="floating-card card2">

                <h3>120K</h3>

                <p>Active Users</p>

            </div>

        </div>

    </div>

</section>

</body>
</html>
