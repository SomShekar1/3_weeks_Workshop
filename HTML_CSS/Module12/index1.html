<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section UI</title>

    <link rel="stylesheet" href="style1.css">

    <!-- <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"> -->
</head>
<body>

    <section class="hero-section">

        <div class="hero-card">

            <!-- Navbar -->

            <nav>

                <div class="logo">
                    <i class="fa-solid fa-layer-group"></i>
                    Nova
                </div>

                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Our Work</a></li>
                    <li><a href="#">Portfolio</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>

                <i class="fa-solid fa-bars"></i>

            </nav>

            <!-- Hero Content -->

            <div class="hero-content">

                <div class="left">

                    <h1>
                        Make <span>Designs</span> That
                        Engage, Delight,
                        and Connect
                    </h1>

                    <p>
                        Create beautiful user experiences,
                        modern interfaces and stunning
                        digital products.
                    </p>

                    <div class="buttons">

                        <button class="btn1">
                            Get Started
                        </button>

                        <button class="btn2">
                            Learn More
                        </button>

                    </div>

                    <div class="stats">

                        <div>
                            <h3>500+</h3>
                            <p>Projects</p>
                        </div>

                        <div>
                            <h3>120+</h3>
                            <p>Clients</p>
                        </div>

                        <div>
                            <h3>10+</h3>
                            <p>Years</p>
                        </div>

                    </div>

                </div>

                <!-- Hero Image -->

                <div class="right">

                    <img src="https://images.unsplash.com/photo-1595152772835-219674b2a8a6?w=500"
     alt="Hero Image">
                </div>

            </div>

        </div>

    </section>

</body>
</html>
